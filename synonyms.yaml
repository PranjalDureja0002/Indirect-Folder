    synonyms:
      - total
      - sum
      - aggregate
      - combined
      - overall
      - all
      - entire
      - cumulative
    description: "Sum aggregation"

  COUNT:
    synonyms:
      - count
      - number of
      - how many
      - quantity of
      - tally
    description: "Count aggregation"

  AVG:
    synonyms:
      - average
      - avg
      - mean
      - typical
      - per unit
    description: "Average aggregation"

  MAX:
    synonyms:
      - maximum
      - max
      - highest
      - largest
      - biggest
      - top
      - most
      - greatest
    description: "Maximum value"

  MIN:
    synonyms:
      - minimum
      - min
      - lowest
      - smallest
      - least
      - bottom
      - fewest
    description: "Minimum value"

  COUNT_DISTINCT:
    synonyms:
