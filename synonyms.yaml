      - distinct
      - different
      - unique count
      - number of unique
      - number of distinct
    description: "Count distinct values"

# Question pattern synonyms
patterns:
  top_n:
    synonyms:
      - top
      - highest
      - largest
      - biggest
      - most
      - leading
      - best
    intent: "ORDER BY DESC with LIMIT"

  bottom_n:
    synonyms:
      - bottom
      - lowest
      - smallest
      - least
      - worst
      - fewest
    intent: "ORDER BY ASC with LIMIT"

  by_dimension:
    synonyms:
      - by
      - per
      - for each
      - grouped by
      - broken down by
      - across
      - split by
    intent: "GROUP BY clause"

  time_filter:
    synonyms:
      - in
      - during
      - for year
      - in year
      - for
    intent: "WHERE INVOICE_DATE filter"

  comparison:
    synonyms:
      - compare
      - versus
      - vs
      - compared to
      - against
    intent: "Comparison query"

  trend:
    synonyms:
      - trend
      - over time
      - year over year
      - yoy
      - month over month
      - growth
    intent: "Time series analysis"

  

# Multi-word phrases mapped to SQL patterns
phrases:
  "total spend":
    sql: "SUM(AMOUNT)"
    description: "Aggregate spend amount"

  "total cost":
    sql: "SUM(AMOUNT)"
    description: "Aggregate cost"

  "total expenditure":
    sql: "SUM(AMOUNT)"
    description: "Aggregate expenditure"

  "number of suppliers":
    sql: "COUNT(DISTINCT SUPPLIER_NO)"
    description: "Count unique suppliers"

  "supplier count":
    sql: "COUNT(DISTINCT SUPPLIER_NO)"
    description: "Count unique suppliers"

  "number of invoices":
    sql: "COUNT(DISTINCT INVOICE_NO)"
    description: "Count unique invoices"

  "invoice count":
    sql: "COUNT(DISTINCT INVOICE_NO)"
    description: "Count unique invoices"

  "number of plants":
    sql: "COUNT(DISTINCT PLANT_NO)"
    description: "Count unique plants"

  "plant count":
    sql: "COUNT(DISTINCT PLANT_NO)"
    description: "Count unique plants"

  "average spend":
    sql: "AVG(AMOUNT)"
    description: "Average transaction amount"

  "average cost":
    sql: "AVG(AMOUNT)"
    description: "Average transaction amount"

  "year over year":
    sql_pattern: "Compare YEAR(INVOICE_DATE) values"
    description: "Year-over-year comparison"

  "year to date":
    sql_pattern: "WHERE INVOICE_DATE >= DATEFROMPARTS(YEAR(GETDATE()), 1, 1)"
    description: "YTD filter"

  "fiscal year":
    sql_pattern: "INVOICE_DATE BETWEEN 'YYYY-04-01' AND 'YYYY+1-03-31'"
    description: "Indian fiscal year filter (April to March)"

  "financial year":
    sql_pattern: "INVOICE_DATE BETWEEN 'YYYY-04-01' AND 'YYYY+1-03-31'"
    description: "Indian fiscal year filter (April to March)"

  "current fiscal year":
    sql_pattern: "INVOICE_DATE BETWEEN DATEADD(MONTH, 3, DATEFROMPARTS(YEAR(DATEADD(MONTH, -3, GETDATE())), 1, 1)) AND LAST_DAY(DATEADD(MONTH, 14, DATEADD(MONTH, 3, DATEFROMPARTS(YEAR(DATEADD(MONTH, -3, GETDATE())), 1, 1))))"
    description: "Current Indian fiscal year"

  "last fiscal year":
    sql_pattern: "INVOICE_DATE BETWEEN DATEADD(MONTH, -9, DATEFROMPARTS(YEAR(DATEADD(MONTH, -3, GETDATE())), 1, 1)) AND DATEADD(DAY, -1, DATEADD(MONTH, 3, DATEFROMPARTS(YEAR(DATEADD(MONTH, -3, GETDATE())), 1, 1)))"
    description: "Previous Indian fiscal year"

  "spend per supplier":
    sql: "SUM(AMOUNT) / COUNT(DISTINCT SUPPLIER_NO)"
    description: "Average spend per supplier"

  "spend per plant":
    sql: "SUM(AMOUNT) / COUNT(DISTINCT PLANT_NO)"
    description: "Average spend per plant"

  "top suppliers":
    sql_pattern: "ORDER BY SUM(AMOUNT) DESC"
    description: "Suppliers ranked by spend"

  "top categories":
    sql_pattern: "ORDER BY SUM(AMOUNT) DESC"
    description: "Categories ranked by spend"

  "past year":
    sql_pattern: "WHERE INVOICE_DATE >= DATEADD(MONTH, -12, CAST(GETDATE() AS DATE)) GROUP BY FORMAT(INVOICE_DATE, 'yyyy-MM') ORDER BY 1"
    description: "Last 12 months with monthly breakdown"

  "over past year":
    sql_pattern: "WHERE INVOICE_DATE >= DATEADD(MONTH, -12, CAST(GETDATE() AS DATE)) GROUP BY FORMAT(INVOICE_DATE, 'yyyy-MM') ORDER BY 1"
    description: "Last 12 months with monthly breakdown"

  "last year":
    sql_pattern: "WHERE INVOICE_DATE >= DATEADD(MONTH, -12, CAST(GETDATE() AS DATE)) GROUP BY FORMAT(INVOICE_DATE, 'yyyy-MM') ORDER BY 1"
    description: "Last 12 months with monthly breakdown"

  "trend over":
    sql_pattern: "GROUP BY FORMAT(INVOICE_DATE, 'yyyy-MM') ORDER BY 1"
    description: "Monthly trend breakdown"