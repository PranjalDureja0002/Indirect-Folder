# Synonym dictionary for NL2SQL
# Maps natural language terms to canonical database terms

# Column synonyms - map user terms to actual column names
columns:
  AMOUNT:
    synonyms:
      - spend
      - expenditure
      - cost
      - expense
      - payment
      - outlay
      - money spent
      - procurement cost
      - spending
      - value
      - eur amount
      - euro amount
    description: "Primary spend column in EUR (budget currency) - use SUM(AMOUNT) for totals"
  
  NET_PRICE:
    synonyms:
      - price
      - Price
      - Negotiated Price
      - Org Price
      - Org negotiated Price
      - net price
      - total price
      - price value
      - negotiated price
    description: "Price column in EUR (budget currency) - use SUM(NET_PRICE) for totals - check for access in request access table for user access"

  SUPPLIER_NAME:
    synonyms:
      - supplier
      - vendor
      - seller
      - provider
      - manufacturer
      - company name
      - vendor name
      - supplier name
    description: "Supplier display name"

  SUPPLIER_NO:
    synonyms:
      - supplier id
      - vendor id
      - supplier number
      - vendor number
      - supplier code
      - vendor code
    description: "Unique supplier identifier"

  REGION:
    synonyms:
      - region
      - geographic region
      - area
      - territory
      - zone
      - business region
    description: "Geographic business region"

  COUNTRY:
    synonyms:
      - country
      - nation
      - country code
      - country name
    description: "Country ISO code"

  PLANT_NAME:
    synonyms:
      - plant
      - factory
      - facility
      - manufacturing plant
      - production facility
      - site
      - location
      - plant name
    description: "Plant display name"

  PLANT_NO:
    synonyms:
      - plant id
      - plant number
      - plant code
      - factory id
      - site code
      - factory code
    description: "Unique plant identifier"

  COMMODITY:
    synonyms:
      - commodity
      - category
      - spend category
      - procurement category
      - product category
      - commodity code
      - material commodity
    description: "High-level commodity code"

  COMMODITY_DESCRIPTION:
    synonyms:
      - commodity name
      - category name
      - commodity description
      - category description
    description: "Commodity category description"

  MATERIAL_TYPE:
    synonyms:
      - material type
      - mat type
    description: "SAP material type code (ROH, HALB, FERT, HIBE)"

  INVOICE_DATE:
    synonyms:
      - date
      - invoice date
      - transaction date
      - purchase date
      - billing date
      - posting date
      - year
      - fiscal year
      - financial year
      - fy
    description: "Invoice issue date - use for time-based filtering"

  QUANTITY:
    synonyms:
      - quantity
      - qty
      - units
      - pieces
      - volume
      - count
      - number of items
      - amount ordered
    description: "Transaction quantity"

  PURCHASING_AGENT_NAME:
    synonyms:
      - buyer
      - purchaser
      - purchasing agent
      - procurement officer
      - buyer name
      - purchasing manager
    description: "Name of purchasing agent"

  MATERIAL_DESCRIPTION:
    synonyms:
      - part
      - article
      - product
      - item
      - material
      - component
      - part description
      - item description
    description: "Article/part description"

  ARTICLE_NO:
    synonyms:
      - part number
      - article number
      - item number
      - material number
      - sku
      - part id
    description: "Article/part identifier"

  INVOICE_NO:
    synonyms:
      - invoice number
      - invoice id
      - bill number
      - invoice
      - bill
      - receipt
      - accounting document
      - document number
    description: "Accounting Document Number / Invoice identifier"

  INVOICE_AMOUNT_CURRENCY:
    synonyms:
      - currency
      - currency code
      - transaction currency
      - document currency
      - invoice currency
    description: "Transaction/document currency code on the invoice"

  INVOICE_AMOUNT_CURRENCY_LOCAL:
    synonyms:
      - local currency
      - local currency code
    description: "Local currency on the invoice"

  PARENT_SUPPLIER_NAME:
    synonyms:
      - parent supplier
      - parent vendor
      - holding company
      - parent company
      - supplier group
    description: "Parent company of supplier"

  ORDER_NO:
    synonyms:
      - purchase order
      - po
      - po number
      - order number
      - order
      - purchase order number
    description: "Purchase Order Number"

  MAIN_ACCOUNT:
    synonyms:
      - gl account
      - g/l account
      - general ledger
      - ledger account
      - account number
      - main account
      - expense account
    description: "General Ledger (G/L) Account Number"

  INCO_TERM:
    synonyms:
      - incoterms
      - incoterm
      - delivery terms
      - shipping terms
      - trade terms
    description: "International commercial terms (DDP, FOB, CIF, EXW)"
  
  ## ADDED NEW
  MATERIAL_GROUP:
    synonyms:
      - material group
      - material category
      - material classification
      - indirect category
    description: "Material group code in indirect spend view (equivalent to KSS in direct)"

  PURCHASE_ORG:
    synonyms:
      - purchasing organization
      - purchase org
      - buying org
      - procurement org
    description: "SAP purchasing organization"

  PAYMENT_TERM:
    synonyms:
      - payment term
      - payment terms
      - pay term
    description: "Payment terms code (indirect view)"

  VOUCHER_AMOUNT:
    synonyms:
      - voucher amount
      - voucher value
      - invoice voucher
    description: "Voucher/invoice amount"

