  "botzingen": "BÖTZINGEN - BOE"
  "bötzingen": "BÖTZINGEN - BOE"
  "boetzingen": "BÖTZINGEN - BOE"
  "boezningen": "BÖTZINGEN - BOE"
  
  # Göttingen variants
  "gottingen": "GÖTTINGEN - GOE"
  "göttingen": "GÖTTINGEN - GOE"
  "goettingen": "GÖTTINGEN - GOE"
  
  # Böblingen variants
  "boeblingen": "MC BÖBLINGEN - BOB"
  "böblingen": "MC BÖBLINGEN - BOB"
  "boebligen": "MC BÖBLINGEN - BOB"
  "boblingen": "MC BÖBLINGEN - BOB"
  "boblingen - bob": "MC BÖBLINGEN - BOB"
