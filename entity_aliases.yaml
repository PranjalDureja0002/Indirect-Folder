# Entity Aliases for Fuzzy Matching
# Maps common user terms to actual database values

metadata:
  version: "1.0"
  description: "Entity value aliases for improved NL2SQL matching"

# Region aliases - user term -> actual database value
region_aliases:
  # Germany and Eastern Europe region
  "germany": "Germany and Eastern Europe"
  "german": "Germany and Eastern Europe"
  "eastern europe": "Germany and Eastern Europe"
  "east europe": "Germany and Eastern Europe"
  "deu": "Germany and Eastern Europe"
  "deutschland": "Germany and Eastern Europe"

  # Iberica region
  "spain": "Iberica"
  "spanish": "Iberica"
  "portugal": "Iberica"
  "portuguese": "Iberica"
  "iberia": "Iberica"
  "iberian": "Iberica"
  "esp": "Iberica"
  "prt": "Iberica"

  # Americas/LATAM region
  "mexico": "Americas"
  "mexican": "Americas"
  "brazil": "Americas"
  "brazilian": "Americas"
  "usa": "Americas"
  "united states": "Americas"
  "america": "Americas"
  "north america": "Americas"
  "south america": "Americas"
  "latam": "Americas"
  "latin america": "Americas"

  # APAC region
  "china": "APAC"
  "chinese": "APAC"
  "india": "APAC"
  "indian": "APAC"
  "asia": "APAC"
  "asia pacific": "APAC"
  "pacific": "APAC"
  "japan": "APAC"
  "japanese": "APAC"
  "korea": "APAC"
  "korean": "APAC"
  "thailand": "APAC"
  "vietnam": "APAC"

  # North region
  "northern": "North"
  "nordic": "North"
  "scandinavia": "North"

# Country aliases - user term -> actual database value in the COUNTRY column.
# IMPORTANT: COUNTRY uses 3-letter codes, NOT ISO-2. Verified by column_values
# snapshot: GER, HUN, MEX, SLO, SRB, USA (Indirect view). Do NOT map to 'DE',
# 'FR', 'IT', 'GB', 'CN', etc. — those values do NOT exist in COUNTRY and
# would silently return 0 rows. (ISO-2 codes live in the separate NATION
# column.) Only include aliases for countries whose suppliers actually exist
# in the Indirect view — listing France/UK/Japan here would just yield
# phantom filters.
country_aliases:
  "germany": "GER"
  "german": "GER"
  "deutschland": "GER"
  "hungary": "HUN"
  "hungarian": "HUN"
  "magyar": "HUN"
  "mexico": "MEX"
  "mexican": "MEX"
  "méxico": "MEX"
  "slovakia": "SLO"
  "slovakian": "SLO"
  "slovak": "SLO"
  "slovensko": "SLO"
  "serbia": "SRB"
  "serbian": "SRB"
  "srbija": "SRB"
  "united states": "USA"
  "usa": "USA"
  "us": "USA"
  "u.s.": "USA"
  "america": "USA"
  "american": "USA"

# Business concept mappings - user phrase -> SQL filter condition
# These map business terms to actual database filter expressions
business_concepts:
  # Supplier classification
  "motherson": "ABC_INDICATOR = 'G'"
  "motherson group": "ABC_INDICATOR = 'G'"
  "motherson supplier": "ABC_INDICATOR = 'G'"
  "motherson suppliers": "ABC_INDICATOR = 'G'"
  "group supplier": "ABC_INDICATOR = 'G'"
  "group suppliers": "ABC_INDICATOR = 'G'"
  "internal supplier": "ABC_INDICATOR = 'G'"
  "internal suppliers": "ABC_INDICATOR = 'G'"
  "captive supplier": "ABC_INDICATOR = 'G'"
  "in-house": "ABC_INDICATOR = 'G'"
  "affiliated": "ABC_INDICATOR = 'G'"

  "external supplier": "ABC_INDICATOR != 'G'"
  "external suppliers": "ABC_INDICATOR != 'G'"
  "external vendor": "ABC_INDICATOR != 'G'"
  "third party": "ABC_INDICATOR != 'G'"
  "third-party": "ABC_INDICATOR != 'G'"
  "outside supplier": "ABC_INDICATOR != 'G'"

  # Material type
  "raw material": "MATERIAL_TYPE = 'ROH'"
  "raw materials": "MATERIAL_TYPE = 'ROH'"
  "semi-finished": "MATERIAL_TYPE = 'HALB'"
  "semifinished": "MATERIAL_TYPE = 'HALB'"
  "finished goods": "MATERIAL_TYPE = 'FERT'"
  "finished products": "MATERIAL_TYPE = 'FERT'"

  # Incoterm responsibility
  "buyer responsibility": "\"INCO_TERM\" IN ('EXW', 'FCA', 'FOB')"
  "buyer-paid": "\"INCO_TERM\" IN ('EXW', 'FCA', 'FOB')"
  "ex works": "\"INCO_TERM\" = 'EXW'"

  "supplier responsibility": "\"INCO_TERM\" IN ('DAP', 'DDP', 'DDU')"
  "delivered": "\"INCO_TERM\" IN ('DAP', 'DDP', 'DDU')"
  "dap": "\"INCO_TERM\" = 'DAP'"
  "ddp": "\"INCO_TERM\" = 'DDP'"

# Commodity category aliases
commodity_aliases:
  "electronics": "Electronics"
  "electronic components": "Electronics"
  "electrical": "Electronics"
  "metals": "Metals"
  "metal parts": "Metals"
  "plastics": "Plastics"
  "plastic parts": "Plastics"
  "rubber": "Rubber"
  "rubber parts": "Rubber"
  "packaging": "Packaging"
  "logistics": "Logistics"
  "transport": "Logistics"
  "services": "Services"
  # NOTE: Do NOT add commodity aliases for "direct" / "indirect" /
  # "direct materials" / "indirect materials". The words "direct" and
  # "indirect" in a user query are VIEW-ROUTING hints (which view to query)
  # — not filters on COMMODITY. Adding them here causes the pipeline to
  # emit spurious WHERE COMMODITY_DESCRIPTION LIKE '%INDIRECT%' filters
  # that return zero rows.

# Plant aliases - German names with umlauts
# Maps ASCII/English spellings to actual database values with umlauts
plant_aliases:
