  sql: "SELECT SUPPLIER_NAME,\n       YEAR(INVOICE_DATE) AS YEAR,\n       MONTH(INVOICE_DATE) AS MONTH,\n       SUM(AMOUNT) AS MONTHLY_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY SUPPLIER_NAME, YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)\nORDER BY SUPPLIER_NAME, YEAR, MONTH\n"
