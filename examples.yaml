metadata:
  version: '1.0'
  count: 87
examples:
- id: ex001
  question: What is the total spend?
  sql: 'SELECT SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    '
  intent: aggregation
  entities: []
  aggregations:
  - SUM
  complexity: 1
  difficulty: easy
- id: ex002
  question: How much did we spend in 2024?
  sql: 'SELECT SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    '
  intent: aggregation_filtered
  entities:
  - year
  aggregations:
  - SUM
  complexity: 1
  difficulty: easy
- id: ex003
  question: Total spend by supplier
  sql: 'SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME

    ORDER BY TOTAL_SPEND DESC

    '
  intent: aggregation_grouped
  entities:
  - supplier
  aggregations:
  - SUM
  complexity: 2
  difficulty: easy
- id: ex004
  question: Spend by region in 2024
  sql: 'SELECT REGION, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    GROUP BY REGION

    ORDER BY TOTAL_SPEND DESC

    '
  intent: aggregation_grouped_filtered
  entities:
  - region
  - year
  aggregations:
  - SUM
  complexity: 2
  difficulty: easy
- id: ex005
  question: What is the total expenditure by commodity category?
  sql: 'SELECT COMMODITY_DESCRIPTION, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY COMMODITY_DESCRIPTION

    ORDER BY TOTAL_SPEND DESC

    '
  intent: aggregation_grouped
  entities:
  - commodity
  aggregations:
  - SUM
  complexity: 2
  note: expenditure -> AMOUNT
  difficulty: easy
- id: ex006
  question: Top 10 suppliers by spend
  sql: 'SELECT TOP 10 SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME

    ORDER BY TOTAL_SPEND DESC

    '
  intent: top_n
  entities:
  - supplier
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex007
  question: Top 5 vendors by cost in 2024
  sql: 'SELECT TOP 5 SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    GROUP BY SUPPLIER_NAME

    ORDER BY TOTAL_SPEND DESC

    '
  intent: top_n_filtered
  entities:
  - supplier
  - year
  aggregations:
  - SUM
  complexity: 2
  note: vendors -> SUPPLIER_NAME, cost -> AMOUNT
  difficulty: medium
- id: ex008
  question: What are the top 10 commodities by expenditure?
  sql: 'SELECT TOP 10 COMMODITY_DESCRIPTION, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY COMMODITY_DESCRIPTION

    ORDER BY TOTAL_SPEND DESC

    '
  intent: top_n
  entities:
  - commodity
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex009
  question: How many suppliers do we have?
  sql: 'SELECT COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    '
  intent: count_distinct
  entities:
  - supplier
  aggregations:
  - COUNT DISTINCT
  complexity: 1
  difficulty: easy
- id: ex010
  question: Number of suppliers by region
  sql: 'SELECT REGION, COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY REGION

    ORDER BY SUPPLIER_COUNT DESC

    '
  intent: count_grouped
  entities:
  - region
  - supplier
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex011
  question: How many invoices per plant in 2024?
  sql: 'SELECT PLANT_NAME, COUNT(DISTINCT INVOICE_NO) AS INVOICE_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    GROUP BY PLANT_NAME

    ORDER BY INVOICE_COUNT DESC

    '
  intent: count_grouped_filtered
  entities:
  - plant
  - year
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex012
  question: Spend trend by year
  sql: 'SELECT YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY YEAR(INVOICE_DATE)

    ORDER BY YEAR

    '
  intent: trend
  entities:
  - year
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex013
  question: Compare 2023 vs 2024 spend by region
  sql: 'SELECT REGION, YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) IN (2023, 2024)

    GROUP BY REGION, YEAR(INVOICE_DATE)

    ORDER BY REGION, YEAR

    '
  intent: comparison
  entities:
  - region
  - year
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex014
  question: Total spend by supplier and commodity
  sql: 'SELECT SUPPLIER_NAME, COMMODITY_DESCRIPTION, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME, COMMODITY_DESCRIPTION

    ORDER BY TOTAL_SPEND DESC

    '
  intent: multi_dimension
  entities:
  - supplier
  - commodity
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex015
  question: Top 10 supplier-plant combinations by spend in 2024
  sql: 'SELECT TOP 10 SUPPLIER_NAME, PLANT_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    GROUP BY SUPPLIER_NAME, PLANT_NAME

    ORDER BY TOTAL_SPEND DESC

    '
  intent: multi_dimension_top_n
  entities:
  - supplier
  - plant
  - year
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex016
  question: Spend from Iberica region
  sql: 'SELECT SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE REGION = ''Iberica''

    '
  intent: filtered_aggregation
  entities:
  - region
  aggregations:
  - SUM
  complexity: 1
  difficulty: easy
- id: ex017
  question: Top 5 suppliers in Americas region
  sql: 'SELECT TOP 5 SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE REGION = ''Americas''

    GROUP BY SUPPLIER_NAME

    ORDER BY TOTAL_SPEND DESC

    '
  intent: top_n_filtered
  entities:
  - region
  - supplier
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex018
  question: Average transaction amount by supplier
  sql: 'SELECT SUPPLIER_NAME, AVG(AMOUNT) AS AVG_AMOUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME

    ORDER BY AVG_AMOUNT DESC

    '
  intent: average_grouped
  entities:
  - supplier
  aggregations:
  - AVG
  complexity: 2
  difficulty: medium
- id: ex019
  question: Spend by fiscal year
  sql: 'SELECT YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY YEAR(INVOICE_DATE)

    ORDER BY YEAR

    '
  intent: trend
  entities:
  - year
  aggregations:
  - SUM
  complexity: 2
  note: fiscal year -> EXTRACT(YEAR FROM INVOICE_DATE)
  difficulty: easy
- id: ex020
  question: Show spend trend over last 4 years
  sql: 'SELECT TOP 4 YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE INVOICE_DATE >= DATEADD(MONTH, -48, GETDATE())

    GROUP BY YEAR(INVOICE_DATE)

    ORDER BY YEAR DESC

    '
  intent: time_series
  entities:
  - year
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex021
  question: Compare this year vs last year spend by supplier
  sql: 'SELECT SUPPLIER_NAME, YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) IN (YEAR(GETDATE()), YEAR(GETDATE()) - 1)

    GROUP BY SUPPLIER_NAME, YEAR(INVOICE_DATE)

    ORDER BY SUPPLIER_NAME, YEAR

    '
  intent: comparison
  entities:
  - supplier
  - year
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex022
  question: Monthly spend breakdown for 2024
  sql: 'SELECT MONTH(INVOICE_DATE) AS MONTH, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) = 2024

    GROUP BY MONTH(INVOICE_DATE)

    ORDER BY MONTH

    '
  intent: time_series
  entities:
  - year
  - month
  aggregations:
  - SUM
  complexity: 2
  difficulty: medium
- id: ex023
  question: Average spend per supplier per region
  sql: 'SELECT SUPPLIER_NAME, REGION, AVG(AMOUNT) AS AVG_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME, REGION

    ORDER BY AVG_SPEND DESC

    '
  intent: aggregation_grouped
  entities:
  - supplier
  - region
  aggregations:
  - AVG
  complexity: 2
  difficulty: medium
- id: ex024
  question: Top 3 suppliers by spend in each plant
  sql: 'SELECT PLANT_NAME, SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY PLANT_NAME, SUPPLIER_NAME

    HAVING SUM(AMOUNT) > (SELECT AVG(AMOUNT) FROM DBO.VW_INDIRECT_SPEND_ALL)

    ORDER BY PLANT_NAME, TOTAL_SPEND DESC

    '
  intent: aggregation_grouped_filtered
  entities:
  - plant
  - supplier
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex025
  question: Spend variance by commodity category
  sql: "SELECT COMMODITY_DESCRIPTION, MIN(AMOUNT) AS MIN_SPEND, MAX(AMOUNT) AS MAX_SPEND,\n       AVG(AMOUNT) AS AVG_SPEND, STDEV(AMOUNT) AS VARIANCE\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY COMMODITY_DESCRIPTION\nORDER BY VARIANCE DESC\n"
  intent: aggregation_grouped
  entities:
  - commodity
  aggregations:
  - MIN
  - MAX
  - AVG
  - STDDEV
  complexity: 3
  difficulty: hard
- id: ex026
  question: Suppliers in North region with spend > 1M in 2024
  sql: 'SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE REGION = ''North'' AND YEAR(INVOICE_DATE) = 2024

    GROUP BY SUPPLIER_NAME

    HAVING SUM(AMOUNT) > 1000000

    ORDER BY TOTAL_SPEND DESC

    '
  intent: filtered_aggregation
  entities:
  - region
  - supplier
  - year
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex027
  question: Plants with more than 50 suppliers in automotive category
  sql: 'SELECT PLANT_NAME, COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE COMMODITY LIKE ''AUTO%''

    GROUP BY PLANT_NAME

    HAVING COUNT(DISTINCT SUPPLIER_NO) > 50

    ORDER BY SUPPLIER_COUNT DESC

    '
  intent: filtered_aggregation
  entities:
  - plant
  - supplier
  - commodity
  aggregations:
  - COUNT DISTINCT
  complexity: 3
  difficulty: hard
- id: ex028
  question: Commodities with YoY growth > 10%
  sql: "SELECT COMMODITY_DESCRIPTION,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) AS SPEND_2024,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) AS SPEND_2023\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) IN (2023, 2024)\nGROUP BY COMMODITY_DESCRIPTION\nHAVING SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) >\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) * 1.1\nORDER BY SPEND_2024 DESC\n"
  intent: comparison
  entities:
  - commodity
  - year
  aggregations:
  - SUM
  complexity: 3
  difficulty: hard
- id: ex029
  question: How many unique suppliers do we have per region
  sql: 'SELECT REGION, COUNT(DISTINCT SUPPLIER_NO) AS UNIQUE_SUPPLIERS

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY REGION

    ORDER BY UNIQUE_SUPPLIERS DESC

    '
  intent: count_grouped
  entities:
  - region
  - supplier
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex030
  question: Count of transactions by month
  sql: 'SELECT MONTH(INVOICE_DATE) AS MONTH, COUNT(*) AS TRANSACTION_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY MONTH(INVOICE_DATE)

    ORDER BY MONTH

    '
  intent: count_grouped
  entities:
  - month
  aggregations:
  - COUNT
  complexity: 2
  difficulty: medium
- id: ex031
  question: Number of commodities per supplier
  sql: 'SELECT SUPPLIER_NAME, COUNT(DISTINCT COMMODITY) AS COMMODITY_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME

    ORDER BY COMMODITY_COUNT DESC

    '
  intent: count_grouped
  entities:
  - supplier
  - commodity
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex032
  question: Suppliers with spend above average
  sql: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY SUPPLIER_NAME\nHAVING SUM(AMOUNT) > (SELECT AVG(TOTAL_SPEND) FROM\n        (SELECT SUPPLIER_NO, SUM(AMOUNT) AS TOTAL_SPEND\n         FROM DBO.VW_INDIRECT_SPEND_ALL GROUP BY SUPPLIER_NO) AS T)\nORDER BY TOTAL_SPEND DESC\n"
  intent: comparison
  entities:
  - supplier
  aggregations:
  - SUM
  - AVG
  complexity: 3
  difficulty: hard
- id: ex033
  question: Plants with highest supplier count vs lowest
  sql: 'SELECT PLANT_NAME, COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY PLANT_NAME

    ORDER BY SUPPLIER_COUNT DESC

    '
  intent: comparison
  entities:
  - plant
  - supplier
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex034
  question: Top performing regions by spend efficiency
  sql: "SELECT REGION, SUM(AMOUNT) AS TOTAL_SPEND, COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT,\n       SUM(AMOUNT) / COUNT(DISTINCT SUPPLIER_NO) AS EFFICIENCY\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY REGION\nORDER BY EFFICIENCY DESC\n"
  intent: comparison
  entities:
  - region
  - supplier
  aggregations:
  - SUM
  - COUNT DISTINCT
  complexity: 3
  difficulty: hard
- id: ex035
  question: Minimum spend transaction per commodity
  sql: 'SELECT COMMODITY_DESCRIPTION, MIN(AMOUNT) AS MIN_AMOUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY COMMODITY_DESCRIPTION

    ORDER BY MIN_AMOUNT

    '
  intent: aggregation_grouped
  entities:
  - commodity
  aggregations:
  - MIN
  complexity: 2
  difficulty: easy
- id: ex036
  question: Maximum single transaction by region
  sql: 'SELECT REGION, MAX(AMOUNT) AS MAX_TRANSACTION

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY REGION

    ORDER BY MAX_TRANSACTION DESC

    '
  intent: aggregation_grouped
  entities:
  - region
  aggregations:
  - MAX
  complexity: 2
  difficulty: easy
- id: ex037
  question: Suppliers with only one commodity
  sql: 'SELECT SUPPLIER_NAME, COUNT(DISTINCT COMMODITY) AS COMMODITY_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY SUPPLIER_NAME

    HAVING COUNT(DISTINCT COMMODITY) = 1

    ORDER BY SUPPLIER_NAME

    '
  intent: filtered_aggregation
  entities:
  - supplier
  - commodity
  aggregations:
  - COUNT DISTINCT
  complexity: 2
  difficulty: medium
- id: ex038
  question: Plants that do business with all major suppliers
  sql: 'SELECT PLANT_NAME, COUNT(DISTINCT SUPPLIER_NO) AS SUPPLIER_COUNT

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY PLANT_NAME

    HAVING COUNT(DISTINCT SUPPLIER_NO) = (SELECT COUNT(DISTINCT SUPPLIER_NO) FROM DBO.VW_INDIRECT_SPEND_ALL)

    ORDER BY PLANT_NAME

    '
  intent: comparison
  entities:
  - plant
  - supplier
  aggregations:
  - COUNT DISTINCT
  complexity: 3
  difficulty: hard
- id: ex039
  question: Regions ranked by total transaction count
  sql: 'SELECT REGION, COUNT(*) AS TRANSACTION_COUNT, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY REGION

    ORDER BY TRANSACTION_COUNT DESC

    '
  intent: aggregation_grouped
  entities:
  - region
  aggregations:
  - COUNT
  - SUM
  complexity: 2
  difficulty: medium
- id: ex040
  question: Top 3 suppliers by spend in each region
  sql: "SELECT REGION, SUPPLIER_NAME, TOTAL_SPEND\nFROM (\n  SELECT REGION, SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND,\n         ROW_NUMBER() OVER (PARTITION BY REGION ORDER BY SUM(AMOUNT) DESC) AS rank_in_region\n  FROM DBO.VW_INDIRECT_SPEND_ALL\n  GROUP BY REGION, SUPPLIER_NAME\n) ranked\nWHERE rank_in_region <= 3\nORDER BY REGION, rank_in_region\n"
  intent: top_n_by_partition
  entities:
  - region
  - supplier
  aggregations:
  - SUM
  - ROW_NUMBER
  pattern_type: window_function
  complexity: 4
  difficulty: hard
  note: ROW_NUMBER() OVER (PARTITION BY...) ranks within each partition. Use WHERE clause to filter ranked results.
- id: ex041
  question: Which suppliers account for top 80% of spend?
  sql: "WITH supplier_spend AS (\n  SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend\n  FROM DBO.VW_INDIRECT_SPEND_ALL\n  GROUP BY SUPPLIER_NAME\n),\nsupplier_ranked AS (\n  SELECT SUPPLIER_NAME, total_spend,\n         PERCENT_RANK() OVER (ORDER BY total_spend DESC) AS percentile\n  FROM supplier_spend\n)\nSELECT SUPPLIER_NAME, total_spend\nFROM supplier_ranked\nWHERE percentile <= 0.20\nORDER BY total_spend DESC\n"
  intent: threshold_cumulative
  entities:
  - supplier
  aggregations:
  - SUM
  - PERCENT_RANK
  pattern_type: cumulative_window
  complexity: 4
  difficulty: hard
  note: PERCENT_RANK() gives 0.0-1.0 percentile. <= 0.20 means top 80% (100% - 80% = 20%). Use CTE for clarity. Window function orders DESC to rank high spenders first.
- id: ex042
  question: What is the tail spend (bottom 10% of suppliers)?
  sql: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE SUPPLIER_NAME IN (\n  SELECT SUPPLIER_NAME FROM (\n    SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend,\n           PERCENT_RANK() OVER (ORDER BY SUM(AMOUNT)) AS pct_rank\n    FROM DBO.VW_INDIRECT_SPEND_ALL\n    GROUP BY SUPPLIER_NAME\n  ) ranked WHERE pct_rank <= 0.10\n)\nGROUP BY SUPPLIER_NAME\nORDER BY total_spend ASC\n"
  intent: tail_spend
  entities:
  - supplier
  aggregations:
  - SUM
  - PERCENT_RANK
  pattern_type: percentile_window
  complexity: 4
  difficulty: hard
  note: Bottom 10% uses PERCENT_RANK with ASC order (small values first). <= 0.10 selects bottom decile. Subquery + IN clause filters suppliers.
- id: ex043
  question: Which materials are sourced from more than one region?
  sql: 'SELECT ARTICLE_NO, MATERIAL_DESCRIPTION, COUNT(DISTINCT REGION) AS num_regions, SUM(AMOUNT) AS total_spend

    FROM DBO.VW_INDIRECT_SPEND_ALL

    GROUP BY ARTICLE_NO, MATERIAL_DESCRIPTION

    HAVING COUNT(DISTINCT REGION) > 1

    ORDER BY num_regions DESC, total_spend DESC

    '
  intent: multi_region_analysis
  entities:
  - article
  - region
  aggregations:
  - COUNT
  - DISTINCT
  - SUM
  pattern_type: having_count_distinct
  complexity: 3
  difficulty: hard
  note: HAVING COUNT(DISTINCT REGION) filters groups. Useful for detecting multi-sourcing scenarios.
- id: ex044
  question: What percentage of total spend does each supplier contribute?
  sql: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend,\n       ROUND(SUM(AMOUNT) * 100.0 / SUM(SUM(AMOUNT)) OVER (), 2) AS pct_of_total_spend\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY SUPPLIER_NAME\nORDER BY total_spend DESC\n"
  intent: contribution_percentage
  entities:
  - supplier
  aggregations:
  - SUM
  - RATIO_TO_REPORT
  pattern_type: contribution_window
  complexity: 3
  difficulty: medium
  note: RATIO_TO_REPORT() OVER () calculates proportion of total. Multiply by 100 for percentage. ROUND() for readability.
- id: ex045
  question: Total spend by supplier classification (Motherson Group vs External)
  sql: "SELECT CASE WHEN ABC_INDICATOR = 'G' THEN 'Motherson Group' ELSE 'External' END AS supplier_type,\n       SUM(AMOUNT) AS total_spend, COUNT(DISTINCT SUPPLIER_NO) AS supplier_count\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY CASE WHEN ABC_INDICATOR = 'G' THEN 'Motherson Group' ELSE 'External' END\nORDER BY total_spend DESC\n"
  intent: supplier_classification
  entities:
  - supplier
  - abc_indicator
  aggregations:
  - SUM
  - COUNT
  pattern_type: classification_analysis
  complexity: 2
  difficulty: medium
  note: Classification query using derived supplier_type logic. Groups by classification.
- id: ex046
  question: Motherson Group supplier spend (ABC_INDICATOR = 'G')
  sql: 'SELECT SUPPLIER_NAME, SUM(AMOUNT) AS total_spend

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE ABC_INDICATOR = ''G''

    GROUP BY SUPPLIER_NAME

    ORDER BY total_spend DESC

    '
  intent: supplier_classification
  entities:
  - supplier
  - abc_indicator
  aggregations:
  - SUM
  pattern_type: filtered_classification
  complexity: 2
  difficulty: easy
  note: Filter for Motherson Group (G). Use for ''group supplier spend'' or similar queries.
- id: ex047
  question: Spend by incoterm responsibility (Buyer vs Supplier vs Shared)
  sql: "SELECT CASE WHEN INCO_TERM IN ('EXW','FCA','FOB') THEN 'Buyer'\n            WHEN INCO_TERM IN ('DAP','DDP','DDU') THEN 'Supplier'\n            WHEN INCO_TERM IN ('CPT','CIP') THEN 'Shared'\n            ELSE 'Unknown' END AS responsibility,\n       SUM(AMOUNT) AS total_spend, COUNT(DISTINCT SUPPLIER_NO) AS supplier_count\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY CASE WHEN INCO_TERM IN ('EXW','FCA','FOB') THEN 'Buyer'\n              WHEN INCO_TERM IN ('DAP','DDP','DDU') THEN 'Supplier'\n              WHEN INCO_TERM IN ('CPT','CIP') THEN 'Shared'\n              ELSE 'Unknown' END\nORDER BY total_spend DESC\n"
  intent: incoterm_analysis
  entities:
  - supplier
  - incoterm
  aggregations:
  - SUM
  - COUNT
  pattern_type: classification_analysis
  complexity: 3
  difficulty: hard
