  sql: "SELECT FORMAT(INVOICE_DATE, 'yyyy') + '-Q' + CAST(DATEPART(QUARTER, INVOICE_DATE) AS NVARCHAR) AS QUARTER,\n       SUM(AMOUNT) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) = 2024\nGROUP BY FORMAT(INVOICE_DATE, 'yyyy') + '-Q' + CAST(DATEPART(QUARTER, INVOICE_DATE) AS NVARCHAR)\nORDER BY QUARTER\n"
