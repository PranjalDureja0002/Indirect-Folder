- id: ex078
  question: Quarterly spend trend for fiscal year 24-25
  sql: "SELECT\n  'FY25-Q' + \n  CASE \n    WHEN MONTH(INVOICE_DATE) IN (4, 5, 6)    THEN '1'\n    WHEN MONTH(INVOICE_DATE) IN (7, 8, 9)    THEN '2'\n    WHEN MONTH(INVOICE_DATE) IN (10, 11, 12) THEN '3'\n    WHEN MONTH(INVOICE_DATE) IN (1, 2, 3)    THEN '4'\n  END AS FISCAL_QUARTER,\n  ROUND(SUM(AMOUNT), 2) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE AMOUNT > 0\n  AND INVOICE_DATE >= '2024-04-01'\n  AND INVOICE_DATE < '2025-04-01'\nGROUP BY \n  CASE \n    WHEN MONTH(INVOICE_DATE) IN (4, 5, 6)    THEN '1'\n    WHEN MONTH(INVOICE_DATE) IN (7, 8, 9)    THEN '2'\n    WHEN MONTH(INVOICE_DATE) IN (10, 11, 12) THEN '3'\n    WHEN MONTH(INVOICE_DATE) IN (1, 2, 3)    THEN '4'\n  END\nORDER BY FISCAL_QUARTER\n"
