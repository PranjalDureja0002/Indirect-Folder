  sql: "SELECT FORMAT(INVOICE_DATE, 'yyyy') + '-' + FORMAT(INVOICE_DATE, 'ww') AS WEEK,\n       SUM(AMOUNT) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE INVOICE_DATE >= DATEADD(DAY, -84, CAST(GETDATE() AS DATE))\nGROUP BY FORMAT(INVOICE_DATE, 'yyyy') + '-' + FORMAT(INVOICE_DATE, 'ww')\nORDER BY WEEK\n"
