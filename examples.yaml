  aggregations:
  - SUM
  - CASE
  complexity: 3
  difficulty: hard
  note: Commodities with declining spend.
- id: ex060
  question: Compare Q1 vs Q2 spending by region
  sql: "SELECT REGION,\n       SUM(CASE WHEN DATEPART(QUARTER, INVOICE_DATE) = 1 THEN AMOUNT ELSE 0 END) AS Q1_SPEND,\n       SUM(CASE WHEN DATEPART(QUARTER, INVOICE_DATE) = 2 THEN AMOUNT ELSE 0 END) AS Q2_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) = YEAR(GETDATE())\nGROUP BY REGION\nORDER BY REGION\n"
  intent: comparison
  entities:
