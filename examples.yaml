- id: ex055
  question: Year over year growth by supplier
  sql: "SELECT SUPPLIER_NAME,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) AS SPEND_2024,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2025 THEN AMOUNT ELSE 0 END) AS SPEND_2025,\n       ROUND((SUM(CASE WHEN YEAR(INVOICE_DATE) = 2025 THEN AMOUNT ELSE 0 END) -\n              SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END)) /\n             NULLIF(SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END), 0) * 100, 2) AS YOY_GROWTH_PCT\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) IN (2024, 2025)\nGROUP BY SUPPLIER_NAME\nHAVING SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) > 0\nORDER BY YOY_GROWTH_PCT DESC\n"
  intent: comparison
  entities:
  - supplier
  - year
  aggregations:
  - SUM
  - CASE
  complexity: 4
  difficulty: hard
  note: YoY growth calculation with percentage change.
- id: ex056
  question: Compare Americas vs Iberica region spend
  sql: 'SELECT REGION, SUM(AMOUNT) AS TOTAL_SPEND

