- id: ex067
  question: Fiscal year spend progression by region
  sql: "SELECT REGION,\n       YEAR(INVOICE_DATE) AS FISCAL_YEAR,\n       SUM(AMOUNT) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY REGION, YEAR(INVOICE_DATE)\nORDER BY REGION, FISCAL_YEAR\n"
