- id: ex057
  question: Supplier spend increase from 2023 to 2024
  sql: "SELECT SUPPLIER_NAME,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) AS SPEND_2023,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) AS SPEND_2024,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) -\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) AS INCREASE\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) IN (2023, 2024)\nGROUP BY SUPPLIER_NAME\nHAVING SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) >\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END)\nORDER BY INCREASE DESC\n"
  intent: comparison
  entities:
  - supplier
  - year
  aggregations:
  - SUM
  - CASE
  complexity: 3
  difficulty: hard
  note: Suppliers with spending increase between years.
- id: ex058
  question: Plant spending higher than previous year
  sql: "SELECT PLANT_NAME,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = YEAR(GETDATE()) - 1 THEN AMOUNT ELSE 0 END) AS PREV_YEAR,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = YEAR(GETDATE()) THEN AMOUNT ELSE 0 END) AS CURRENT_YEAR\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY PLANT_NAME\nHAVING SUM(CASE WHEN YEAR(INVOICE_DATE) = YEAR(GETDATE()) THEN AMOUNT ELSE 0 END) >\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = YEAR(GETDATE()) - 1 THEN AMOUNT ELSE 0 END)\nORDER BY CURRENT_YEAR DESC\n"
  intent: comparison
  entities:
  - plant
  - year
  aggregations:
  - SUM
  - CASE
  complexity: 3
  difficulty: hard
  note: Dynamic year comparison using SYSDATE.
- id: ex059
  question: Commodity spend decline in 2024
  sql: "SELECT COMMODITY_DESCRIPTION,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) AS SPEND_2023,\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) AS SPEND_2024\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE YEAR(INVOICE_DATE) IN (2023, 2024)\nGROUP BY COMMODITY_DESCRIPTION\nHAVING SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END) <\n       SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END)\nORDER BY (SUM(CASE WHEN YEAR(INVOICE_DATE) = 2023 THEN AMOUNT ELSE 0 END) -\n          SUM(CASE WHEN YEAR(INVOICE_DATE) = 2024 THEN AMOUNT ELSE 0 END)) DESC\n"
  intent: comparison
  entities:
