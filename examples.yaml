  sql: "SELECT YEAR(INVOICE_DATE) AS YEAR,\n       MONTH(INVOICE_DATE) AS MONTH,\n       SUM(AMOUNT) AS TOTAL_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)\nORDER BY YEAR, MONTH\n"
