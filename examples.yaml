- id: ex061
  question: Variance between supplier spend and average
  sql: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND,\n       SUM(AMOUNT) - (SELECT AVG(supplier_total) FROM (\n         SELECT SUM(AMOUNT) AS supplier_total FROM DBO.VW_INDIRECT_SPEND_ALL GROUP BY SUPPLIER_NAME\n       ) AS supplier_totals) AS VARIANCE_FROM_AVG\nFROM DBO.VW_INDIRECT_SPEND_ALL\nGROUP BY SUPPLIER_NAME\nORDER BY VARIANCE_FROM_AVG DESC\n"
  intent: comparison
  entities:
