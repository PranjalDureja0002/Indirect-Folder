  sql: "SELECT CAST(INVOICE_DATE AS DATE) AS INVOICE_DAY,\n       COUNT(*) AS TRANSACTION_COUNT,\n       SUM(AMOUNT) AS DAILY_SPEND\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE INVOICE_DATE >= DATEFROMPARTS(YEAR(GETDATE()), MONTH(GETDATE()), 1)\nGROUP BY CAST(INVOICE_DATE AS DATE)\nORDER BY INVOICE_DAY\n"
