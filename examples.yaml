  - supplier_type
  pattern_type: window_function_top_n
  complexity: 4
  difficulty: hard
  note: Window function (ROW_NUMBER) to find top 5 suppliers per region with classification.
- id: ex050
  question: Spend for external suppliers in plant 5000
  sql: 'SELECT ROUND(SUM(AMOUNT), 2) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE ABC_INDICATOR != ''G'' AND PLANT_NO = ''5000''

    '
  intent: filtered_aggregation
  entities:
  - supplier
  - plant
  - abc_indicator
  aggregations:
  - SUM
  note: External suppliers are ABC_INDICATOR != ''G''. Group suppliers are ABC_INDICATOR = ''G''.
- id: ex051
  question: Suppliers accounting for top 80% of spend by region and commodity with year-to-date comparison
  sql: "WITH regional_commodity_spend AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, YEAR(INVOICE_DATE) AS year,\n         SUM(AMOUNT) AS supplier_spend\n  FROM DBO.VW_INDIRECT_SPEND_ALL\n  GROUP BY REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, YEAR(INVOICE_DATE)\n),\nsupplier_ranked AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, year, supplier_spend,\n         PERCENT_RANK() OVER (PARTITION BY REGION, COMMODITY ORDER BY supplier_spend DESC) AS percentile\n  FROM regional_commodity_spend\n)\nSELECT REGION, COMMODITY, year, SUPPLIER_NO, SUPPLIER_NAME, supplier_spend, percentile\nFROM supplier_ranked\nWHERE percentile <= 0.20\nORDER BY REGION, COMMODITY, year, percentile\n"
  intent: percentile_threshold
  entities:
  - region
  - commodity
  - supplier
  - year
  aggregations:
  - SUM
  - PERCENT_RANK
  dimensions:
  - region
  - commodity
  - year
  - supplier
  pattern_type: window_function_percentile
  complexity: 4
  difficulty: hard
  note: 'Percentile filtering (PERCENT_RANK) across 4 dimensions: region, commodity, supplier, year.'
- id: ex052
  question: Average unit price and total volume by supplier and region for last 2 years, top 10 by spend
  sql: "SELECT TOP 10 SUPPLIER_NO, SUPPLIER_NAME, REGION, YEAR(INVOICE_DATE) AS year,\n       COUNT(DISTINCT ARTICLE_NO) AS article_count,\n       SUM(AMOUNT) AS total_spend,\n       AVG(AMOUNT) AS avg_unit_price,\n       COUNT(*) AS invoice_lines,\n       SUM(AMOUNT) / NULLIF(COUNT(DISTINCT ARTICLE_NO), 0) AS spend_per_article\nFROM DBO.VW_INDIRECT_SPEND_ALL\nWHERE INVOICE_DATE >= DATEADD(DAY, -730, CAST(GETDATE() AS DATE))\nGROUP BY SUPPLIER_NO, SUPPLIER_NAME, REGION, YEAR(INVOICE_DATE)\nORDER BY total_spend DESC\n"
  intent: aggregation_grouped
  entities:
  - supplier
  - region
  - year
  - article
  aggregations:
  - SUM
  - AVG
  - COUNT
  dimensions:
  - supplier
  - region
  - year
  pattern_type: multi_aggregate_analysis
  complexity: 4
  difficulty: hard
  note: Multi-dimension aggregation (supplier+region+year) with derived metrics (spend_per_article).
- id: ex053
  question: Cumulative supplier spend trend by region, commodity, and year
  sql: "WITH supplier_monthly_spend AS (\n  SELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME,\n         YEAR(INVOICE_DATE) AS year,\n         MONTH(INVOICE_DATE) AS month,\n         SUM(AMOUNT) AS monthly_spend\n  FROM DBO.VW_INDIRECT_SPEND_ALL\n  GROUP BY REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME,\n           YEAR(INVOICE_DATE), MONTH(INVOICE_DATE)\n)\nSELECT REGION, COMMODITY, SUPPLIER_NO, SUPPLIER_NAME, year, month, monthly_spend,\n       SUM(monthly_spend) OVER (PARTITION BY REGION, COMMODITY, SUPPLIER_NO ORDER BY year, month\n                                 ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW) AS cumulative_spend\nFROM supplier_monthly_spend\nORDER BY REGION, COMMODITY, SUPPLIER_NO, year, month\n"
  intent: cumulative_sum
  entities:
  - region
  - commodity
  - supplier
  - year
  - month
  aggregations:
  - SUM
  - WINDOW
  dimensions:
  - region
  - commodity
  - supplier
  - year
  pattern_type: window_function_cumulative
  complexity: 4
  difficulty: hard
  note: Window function cumulative sum across 5 dimensions (region, commodity, supplier, year, month).
- id: ex054
  question: Compare 2024 vs 2025 spend
  sql: 'SELECT YEAR(INVOICE_DATE) AS YEAR, SUM(AMOUNT) AS TOTAL_SPEND

    FROM DBO.VW_INDIRECT_SPEND_ALL

    WHERE YEAR(INVOICE_DATE) IN (2024, 2025)

