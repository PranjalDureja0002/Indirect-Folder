# SQL Anti-Patterns for NL2SQL
# Common mistakes to avoid in generated SQL

metadata:
  version: "1.0"
  description: "SQL anti-patterns and their corrections for SQL Server SQL generation"

anti_patterns:
  # Syntax errors
  - id: "ap001"
    name: "LIMIT instead of TOP"
    pattern: "\\bLIMIT\\s+\\d+"
    severity: "error"
    description: "MySQL/PostgreSQL LIMIT syntax used instead of SQL Server"
    fix: "Replace 'LIMIT N' with 'SELECT TOP N ...' (place TOP immediately after SELECT)"
    example_bad: "SELECT * FROM table LIMIT 10"
    example_good: "SELECT TOP 10 * FROM table"

  - id: "ap002"
    name: "Trailing semicolon"
    pattern: ";\\s*$"
    severity: "warning"
    description: "SQL ends with semicolon which may cause issues in some contexts"
    fix: "Remove trailing semicolon"
    example_bad: "SELECT * FROM table;"
    example_good: "SELECT * FROM table"

  - id: "ap003"
    name: "GROUP BY without aggregation"
    pattern: "GROUP BY(?!.*(?:SUM|COUNT|AVG|MIN|MAX|STDDEV))"
    severity: "error"
    description: "GROUP BY used but no aggregation function in SELECT"
    fix: "Add SUM(AMOUNT), COUNT(*), or other aggregation to SELECT"
    example_bad: "SELECT SUPPLIER_NAME, AMOUNT FROM table GROUP BY SUPPLIER_NAME"
    example_good: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND FROM table GROUP BY SUPPLIER_NAME"

  - id: "ap004"
    name: "SELECT * with GROUP BY"
    pattern: "SELECT\\s+\\*.*GROUP BY"
    severity: "error"
    description: "SELECT * incompatible with GROUP BY clause"
    fix: "Only SELECT grouped columns and aggregations"
    example_bad: "SELECT * FROM table GROUP BY SUPPLIER_NAME"
    example_good: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND FROM table GROUP BY SUPPLIER_NAME"

  # Alias issues
  - id: "ap005"
    name: "Reserved keyword as alias"
    pattern: "\\bAS\\s+(VALUE|DATE|USER|NUMBER|TYPE|LEVEL|ROLE|ACTION|GROUP|ORDER)\\b"
    severity: "error"
    description: "SQL Server reserved keyword used as column alias"
    fix: "Use descriptive alias like TOTAL_SPEND, SUPPLIER_COUNT, etc."
    example_bad: "SUM(AMOUNT) AS VALUE"
    example_good: "SUM(AMOUNT) AS TOTAL_SPEND"

  - id: "ap006"
    name: "SUM(AMOUNT) AS AMOUNT"
    pattern: "SUM\\(AMOUNT\\)\\s+AS\\s+AMOUNT"
    severity: "warning"
    description: "Aggregated column uses same name as source column"
    fix: "Use distinct alias like TOTAL_SPEND"
    example_bad: "SUM(AMOUNT) AS AMOUNT"
    example_good: "SUM(AMOUNT) AS TOTAL_SPEND"

  - id: "ap007"
    name: "Missing alias for aggregation"
    pattern: "(?:SUM|COUNT|AVG|MIN|MAX)\\([^)]+\\)(?!\\s+AS\\s+)"
    severity: "warning"
    description: "Aggregation function without an alias"
    fix: "Add AS alias_name after aggregation"
    example_bad: "SELECT SUPPLIER_NAME, SUM(AMOUNT) FROM table"
    example_good: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND FROM table"

  # Date handling issues
  - id: "ap008"
    name: "String comparison for dates"
    pattern: "INVOICE_DATE\\s*=\\s*'[^']*'"
    severity: "warning"
    description: "Direct string comparison with date column"
    fix: "Use proper date literal or CAST for date comparisons"
    example_bad: "WHERE INVOICE_DATE = '2024-01-01'"
    example_good: "WHERE INVOICE_DATE = CAST('2024-01-01' AS DATE)"

  - id: "ap009"
    name: "Year as string comparison"
    pattern: "INVOICE_DATE\\s*(?:=|LIKE)\\s*'\\d{4}'"
    severity: "error"
    description: "Comparing date to year string"
    fix: "Use YEAR(INVOICE_DATE)"
    example_bad: "WHERE INVOICE_DATE LIKE '2024%'"
    example_good: "WHERE YEAR(INVOICE_DATE) = 2024"

  # Column issues
  - id: "ap010"
    name: "Invalid column name"
    pattern: "(?:SELECT|WHERE|GROUP BY|ORDER BY).*\\b(?:SPEND|VENDOR|FACTORY|TOTAL|COST|REVENUE)\\b"
    severity: "error"
    description: "Using common business term instead of actual column name"
    fix: "Use actual column names: AMOUNT, SUPPLIER_NAME, PLANT_NAME, etc."
    example_bad: "SELECT VENDOR, SPEND FROM table"
    example_good: "SELECT SUPPLIER_NAME, SUM(AMOUNT) AS TOTAL_SPEND FROM table"

  - id: "ap011"
    name: "YEAR column instead of YEAR()"
    pattern: "\\bYEAR\\s*(?:=|IN|>|<)"
    severity: "error"
    description: "Using YEAR as if it's a column"
    fix: "Use YEAR(INVOICE_DATE)"
    example_bad: "WHERE YEAR = 2024"
    example_good: "WHERE YEAR(INVOICE_DATE) = 2024"

  # Logical issues
  - id: "ap012"
    name: "Missing ORDER BY for aggregation"
    pattern: "GROUP BY(?!.*ORDER BY)"
    severity: "warning"
    description: "Aggregation query without ORDER BY"
    fix: "Add ORDER BY to sort results meaningfully"
    example_bad: "SELECT REGION, SUM(AMOUNT) FROM table GROUP BY REGION"
    example_good: "SELECT REGION, SUM(AMOUNT) AS TOTAL_SPEND FROM table GROUP BY REGION ORDER BY TOTAL_SPEND DESC"

  - id: "ap013"
    name: "Missing column in GROUP BY"
    pattern: "SELECT\\s+([A-Z_]+)(?:,|\\s+).*(?:SUM|COUNT|AVG).*GROUP BY(?!.*\\1)"
    severity: "error"
    description: "Non-aggregated column in SELECT not in GROUP BY"
    fix: "Include all non-aggregated columns in GROUP BY"
    example_bad: "SELECT SUPPLIER_NAME, REGION, SUM(AMOUNT) FROM table GROUP BY SUPPLIER_NAME"
    example_good: "SELECT SUPPLIER_NAME, REGION, SUM(AMOUNT) FROM table GROUP BY SUPPLIER_NAME, REGION"

  - id: "ap014"
    name: "HAVING without GROUP BY"
    pattern: "HAVING(?!.*GROUP BY)"
    severity: "error"
    description: "HAVING clause used without GROUP BY"
    fix: "Add GROUP BY clause or use WHERE instead"
    example_bad: "SELECT * FROM table HAVING SUM(AMOUNT) > 1000"
    example_good: "SELECT SUPPLIER_NAME, SUM(AMOUNT) FROM table GROUP BY SUPPLIER_NAME HAVING SUM(AMOUNT) > 1000"

  # SQL Server-specific issues
  - id: "ap015"
    name: "ILIKE instead of case-insensitive LIKE"
    pattern: "\\bILIKE\\b"
    severity: "error"
    description: "PostgreSQL ILIKE not available in SQL Server"
    fix: "Use UPPER(column) LIKE UPPER('%value%') or a case-insensitive collation"
    example_bad: "WHERE SUPPLIER_NAME ILIKE '%acme%'"
    example_good: "WHERE UPPER(SUPPLIER_NAME) LIKE UPPER('%ACME%')"

  - id: "ap016"
    name: "ISNULL with only one argument"
    pattern: "ISNULL\\([^,]+\\)$"
    severity: "warning"
    description: "ISNULL with only one argument"
    fix: "ISNULL requires two arguments: ISNULL(expr, default_value)"
    example_bad: "ISNULL(AMOUNT)"
    example_good: "ISNULL(AMOUNT, 0)"

  - id: "ap017"
    name: "FETCH FIRST instead of TOP"
    pattern: "FETCH\\s+FIRST\\s+\\d+\\s+ROWS\\s+ONLY"
    severity: "error"
    description: "Oracle FETCH FIRST syntax used instead of SQL Server"
    fix: "Replace with SELECT TOP N ... (place TOP immediately after SELECT)"
    example_bad: "SELECT * FROM table FETCH FIRST 10 ROWS ONLY"
    example_good: "SELECT TOP 10 * FROM table"

  # Enumerate-specific issues
  - id: "ap018"
    name: "Aggregation in enumerate query"
    pattern: "SELECT\\s+DISTINCT.*(?:SUM|COUNT|AVG|MAX|MIN)\\("
    severity: "warning"
    description: "Aggregation function used with DISTINCT in enumerate query"
    fix: "For enumerate queries, use only SELECT DISTINCT column without aggregation"
    example_bad: "SELECT DISTINCT REGION, SUM(AMOUNT) FROM table"
    example_good: "SELECT DISTINCT REGION FROM table ORDER BY REGION"

  - id: "ap019"
    name: "GROUP BY in enumerate query"
    pattern: "SELECT\\s+DISTINCT.*GROUP BY"
    severity: "warning"
    description: "GROUP BY used with DISTINCT"
    fix: "For enumerate queries, use DISTINCT alone without GROUP BY"
    example_bad: "SELECT DISTINCT REGION FROM table GROUP BY REGION"
    example_good: "SELECT DISTINCT REGION FROM table ORDER BY REGION"

  # Performance issues
  - id: "ap020"
    name: "Function on column in WHERE"
    pattern: "WHERE\\s+(?:UPPER|LOWER|LTRIM|RTRIM|SUBSTRING)\\([A-Z_]+\\)"
    severity: "info"
    description: "Function applied to column may prevent index usage"
    fix: "Consider using computed column index or alternative approach"
    example_bad: "WHERE UPPER(SUPPLIER_NAME) = 'ACME'"
    example_good: "WHERE SUPPLIER_NAME = 'ACME' (if case-consistent data)"

# Validation rules for SQL output
validation_rules:
  - id: "vr001"
    name: "Must reference DBO.VW_INDIRECT_SPEND_ALL"
    pattern: "FROM\\s+DBO.VW_INDIRECT_SPEND_ALL"
    required: true
    description: "Query must use the correct view name"

  - id: "vr002"
    name: "No markdown code blocks"
    pattern: "^```"
    forbidden: true
    description: "SQL should not be wrapped in markdown code blocks"

  - id: "vr003"
    name: "No SQL prefix"
    pattern: "^(?:sql|SQL):"
    forbidden: true
    description: "SQL should not be prefixed with 'sql:' or 'SQL:'"

  - id: "vr004"
    name: "Balanced parentheses"
    check_type: "balanced_parens"
    description: "All parentheses must be properly balanced"